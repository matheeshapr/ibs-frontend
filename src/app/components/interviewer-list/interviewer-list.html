<div class="container pb-5">
  <div class="text-center py-5">
    <h1 class="fw-bold text-dark">Find an Expert Interviewer</h1>
    <p class="text-muted fs-5">Book your session with our top-rated industry experts.</p>
  </div>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let interviewer of interviewers">
      <div class="card h-100 p-3 rounded-4">
        <div class="card-body text-center">
          <div class="avatar-box mb-3">
             <img src="https://ui-avatars.com/api/?name={{interviewer.name}}&background=10b981&color=fff&size=100" 
                 class="rounded-circle shadow-sm" alt="Profile">
          </div>
          <h5 class="fw-bold mb-1">{{ interviewer.name }}</h5>
          <span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill mb-3">
            {{ interviewer.department }}
          </span>
          <p class="small text-muted mb-4">Specialized in technical assessment and career coaching.</p>
          <button class="btn btn-success w-100 rounded-pill py-2 fw-semibold" (click)="viewSlots(interviewer.id)">
            Book Appointment
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
