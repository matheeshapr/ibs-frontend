<div class="container my-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold text-white">Available Interview Slots</h3>
    <button class="btn btn-outline-emerald btn-sm" (click)="loadSlots()">
      <i class="bi bi-arrow-clockwise me-1"></i> Refresh
    </button>
  </div>

  <div class="row g-4">
    <div class="col-md-3 col-sm-6" *ngFor="let slot of slots">
      <div class="slot-card shadow-sm" [ngClass]="slot.booked ? 'booked' : 'available'">
        <div class="card-body p-4 text-center">
          <div class="time-icon mb-3">
            <i class="bi" [ngClass]="slot.booked ? 'bi-lock-fill' : 'bi-unlock-fill'"></i>
          </div>
          <h5 class="fw-bold mb-1">{{ slot.startTime | date:'shortTime' }}</h5>
          <p class="small opacity-75 mb-3">{{ slot.startTime | date:'longDate' }}</p>
          
          <button *ngIf="!slot.booked" class="btn btn-emerald-glass w-100" (click)="onBook(slot.id)">
            Book Now
          </button>
          <span *ngIf="slot.booked" class="badge bg-danger-glass w-100 py-2">Reserved</span>
        </div>
      </div>
    </div>
  </div>
</div>
